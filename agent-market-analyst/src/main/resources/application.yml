server:
  port: 8081

spring:
  application:
    name: agent-market-analyst
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pretrade}
    username: ${DB_USERNAME:pretrade}
    password: ${DB_PASSWORD:pretrade}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6
  max-tokens: 4096
  base-url: https://api.anthropic.com/v1

analyst:
  gap-threshold: 0.5
  min-composite-score: 60.0
  weights:
    gap: 25
    sentiment: 20
    volume: 20
    oi: 20
    alignment: 15
  top-n-stocks: 20
  data-source-timeout-seconds: 30

logging:
  level:
    com.pretrade.analyst: INFO
    org.hibernate.SQL: WARN
