version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pretrade-db
    environment:
      POSTGRES_DB: pretrade
      POSTGRES_USER: pretrade
      POSTGRES_PASSWORD: pretrade
    ports:
      - "5432:5432"
    volumes:
      - pretrade-pgdata:/var/lib/postgresql/data
      - ./shared-db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pretrade -d pretrade"]
      interval: 5s
      timeout: 5s
      retries: 10

  market-analyst:
    build:
      context: .
      dockerfile: agent-market-analyst/Dockerfile
    container_name: pretrade-market-analyst
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pretrade
      DB_USERNAME: pretrade
      DB_PASSWORD: pretrade
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  trade-executor:
    build:
      context: .
      dockerfile: agent-trade-executor/Dockerfile
    container_name: pretrade-trade-executor
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pretrade
      DB_USERNAME: pretrade
      DB_PASSWORD: pretrade
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  learning-summary:
    build:
      context: .
      dockerfile: agent-learning-summary/Dockerfile
    container_name: pretrade-learning-summary
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pretrade
      DB_USERNAME: pretrade
      DB_PASSWORD: pretrade
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pretrade-pgdata:
