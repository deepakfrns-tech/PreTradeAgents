server:
  port: 8083

spring:
  application:
    name: agent-learning-summary
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pretrade}
    username: ${DB_USERNAME:pretrade}
    password: ${DB_PASSWORD:pretrade}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-opus-4-6
  max-tokens: 8192
  base-url: https://api.anthropic.com/v1

learner:
  min-confidence-for-learning: 0.7
  lookback-days: 30
  pattern-min-occurrences: 3

logging:
  level:
    com.pretrade.learner: INFO
    org.hibernate.SQL: WARN
